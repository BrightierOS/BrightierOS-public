<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Community Store</title>
  <link rel="stylesheet" href="assets/dashboard.css">
</head>
<body>
  <h1 class="box">Community App Store</h1>
  <section id="add-store" class="store-section">
    <h2>Adicionar nova loja</h2>
    <form id="store-form" class="stack">
      <label>ID: <input type="text" name="id" required></label>
      <label>Nome: <input type="text" name="name" required></label>
      <label>URL (HTTPS): <input type="url" name="url" placeholder="https://github.com/..." required></label>
      <button type="submit">Adicionar</button>
    </form>
    <p id="store-msg"></p>
  </section>
  <section id="stores-list" class="store-section">
    <h2>Lojas registradas</h2>
    <ul id="stores"></ul>
  </section>
  <section id="apps-list" class="store-section" style="display:none;">
    <h2>Plugins da loja <span id="current-store-name"></span></h2>
    <ul id="apps"></ul>
    <button id="back-to-stores">Voltar às lojas</button>
  </section>
  
  <script src="assets/store.js"></script>

<nav class="dock">
    <a href="/" class="dock-item" data-page="dashboard">
        <span class="dock-icon">🏠</span>
        <span class="dock-label">Dashboard</span>
    </a>
    <a href="/files.html" class="dock-item" data-page="files">
        <span class="dock-icon">📁</span>
        <span class="dock-label">Files</span>
    </a>
    <a href="/console.html" class="dock-item" data-page="console">
        <span class="dock-icon">💻</span>
        <span class="dock-label">Console</span>
    </a>
    <a href="/store.html" class="dock-item" data-page="store">
        <span class="dock-icon">🛒</span>
        <span class="dock-label">Store</span>
    </a>
</nav>

<script>
    document.querySelectorAll('.dock-item').forEach(function(item) {
        var href = item.getAttribute('href');
        var current = window.location.pathname;
        if (href === current || (href === '/' && (current === '/index.html' || current === '/'))) {
            item.classList.add('active');
        }
    });
</script>
</body>
</html>
