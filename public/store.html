<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Loja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="store" data-title="Loja" data-sub="Plugins da comunidade.">
  <div id="boot-loader" aria-hidden="true">
    <div class="boot-loader-inner">
      <div class="boot-logo">
        <img src="assets/BrightierOS.png" alt="BrightierOS" onerror="this.style.display='none'">
      </div>
      <div class="boot-name">Brightier<b>OS</b></div>
      <div class="boot-spinner"></div>
      <div class="boot-text">Inicializando o sistema…</div>
    </div>
  </div>

  <main class="page">

    <section class="card">
      <h2>Adicionar loja comunitária</h2>
      <form id="storeForm" class="form-grid" style="margin-top:12px;">
        <div><label for="sid">ID</label><input id="sid" name="id" placeholder="minha-loja" required></div>
        <div><label for="sname">Nome</label><input id="sname" name="name" placeholder="Minha Loja" required></div>
        <div class="full"><label for="surl">URL (HTTPS)</label><input id="surl" name="url" type="url" placeholder="https://github.com/usuario/repo" required></div>
        <div class="actions"><button class="btn sm" type="submit">Adicionar</button></div>
      </form>
      <p class="msg" id="storeMsg"></p>
    </section>

    <section class="card">
      <h2>Lojas registradas</h2>
      <div class="grid cols-auto" id="stores"><p class="muted">Carregando...</p></div>
    </section>

    <section class="card hidden" id="appsSection">
      <div class="toolbar" style="justify-content:space-between; margin-bottom:12px;">
        <h2 style="margin:0;">Plugins — <span id="currentStoreName" style="color:var(--accent)"></span></h2>
        <button id="backToStores" class="btn ghost sm">← Voltar</button>
      </div>
      <div class="grid cols-auto" id="apps"><p class="muted">Carregando catálogo...</p></div>
    </section>

  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/store.js"></script>
</body>
</html>
