<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Arquivos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="files" data-title="Arquivos" data-sub="Seus dados, organizados.">
  <div id="boot-loader" aria-hidden="true">
    <div class="boot-loader-inner">
      <div class="boot-logo">
        <img src="assets/BrightierOS.png" alt="BrightierOS" onerror="this.style.display='none'">
      </div>
      <div class="boot-name">Brightier<b>OS</b></div>
      <div class="boot-spinner"></div>
      <div class="boot-text">Inicializando o sistema…</div>
    </div>
  </div>

  <main class="page">
    <section class="card">
      <div class="toolbar" style="justify-content:space-between; gap:14px; margin-bottom:8px;">
        <div class="breadcrumb" id="breadcrumb"><span class="crumb current">Home</span></div>
      </div>
      <div class="toolbar">
        <button id="backBtn" class="btn ghost sm">← Voltar</button>
        <button id="newFolderBtn" class="btn sm">📁 Nova pasta</button>
        <button id="newFileBtn" class="btn sm">📄 Novo arquivo</button>
        <button id="uploadBtn" class="btn sm">↑ Upload</button>
        <button id="uploadFolderBtn" class="btn sm">↑ Upload de pasta</button>
        <a class="btn ghost sm" href="/trash.html">🗑 Lixeira</a>
      </div>
      <input type="file" id="uploadInput" hidden />
      <input type="file" id="uploadFolderInput" webkitdirectory directory multiple hidden />
    </section>

    <section class="card">
      <div class="file-grid" id="fileGrid"><p class="empty">Carregando...</p></div>
    </section>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/files.js"></script>
</body>
</html>
