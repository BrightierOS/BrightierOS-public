<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="dashboard" data-title="Dashboard" data-sub="Seu servidor, mais brilhante.">
  <main class="page">
    <div class="grid cols-3">

      <section class="card" style="grid-column: span 2;">
        <h2>Desempenho</h2>
        <div id="stats"><p class="muted">Carregando métricas...</p></div>
      </section>

      <section class="card">
        <h2>Atalhos</h2>
        <div class="grid" style="gap:10px;">
          <a class="btn ghost block" href="/files.html">🗀 Arquivos</a>
          <a class="btn ghost block" href="/console.html">▣ Console</a>
          <a class="btn ghost block" href="/store.html">🛒 Loja</a>
          <a class="btn ghost block" href="/trash.html">🗑 Lixeira</a>
        </div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Meus Plugins</h2>
        <div id="installed-plugins-list"><p class="muted">Carregando plugins...</p></div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Atualizações</h2>
        <div id="update-status"></div>
        <div class="toolbar">
          <button id="checkUpdateBtn" class="btn sm">Verificar atualizações</button>
          <button id="applyUpdateBtn" class="btn sm" style="display:none">Atualizar agora</button>
        </div>
        <div id="update-history"></div>
      </section>

    </div>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/dashboard.js"></script>
</body>
</html>
