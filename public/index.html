<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="dashboard" data-title="Dashboard" data-sub="Your infrastructure. Brighter.">
  <div id="boot-loader" aria-hidden="true">
    <div class="boot-loader-inner">
      <div class="boot-logo">
        <img src="assets/BrightierOS.png" alt="BrightierOS" onerror="this.style.display='none'">
      </div>
      <div class="boot-name">Brightier<b>OS</b></div>
      <div class="boot-spinner"></div>
      <div class="boot-text">Inicializando o sistema…</div>
    </div>
  </div>

  <main class="page">
    <div class="grid cols-3">

      <section class="card" style="grid-column: span 2;">
        <h2>Performance</h2>
        <div id="stats"><p class="muted">Loading metrics...</p></div>
        <div id="history" style="margin-top:12px;height:100px;border-top:1px solid var(--line-soft);padding-top:8px"></div>
      </section>

      <section class="card">
        <h2>Shortcuts</h2>
        <div class="grid" style="gap:10px;">
          <a class="btn ghost block" href="/files.html">📁 Files</a>
          <a class="btn ghost block" href="/store.html">🛒 Store</a>
          <a class="btn ghost block" href="/trash.html">🗑 Trash</a>
        </div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Installed Plugins</h2>
        <div id="installed-plugins-list"><p class="muted">Loading plugins...</p></div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Smart Updates</h2>
        <div id="local-changes" style="display:none"></div>
        <div id="update-status"></div>
        <div class="toolbar">
          <button id="checkUpdateBtn" class="btn sm">Check for updates</button>
          <input id="targetVersion" type="text" placeholder="Target version (e.g. 0.7.1)" style="width:260px" />
          <button id="applyUpdateBtn" class="btn sm" style="display:none">Update now</button>
        </div>
        <div class="toolbar" style="margin-top:8px">
          <button id="backupBtn" class="btn ghost sm">🗄 Backup</button>
          <button id="changelogBtn" class="btn ghost sm">📝 Changelog</button>
          <button id="restoreBtn" class="btn ghost sm">♻ Restore</button>
        </div>
        <div id="update-history"></div>
      </section>

    </div>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/dashboard.js"></script>
</body>
</html>
