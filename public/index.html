<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="dashboard" data-title="Dashboard" data-sub="Seu servidor, mais brilhante.">
  <div id="boot-loader" aria-hidden="true">
    <div class="boot-loader-inner">
      <div class="boot-logo">
        <img src="assets/BrightierOS.png" alt="BrightierOS" onerror="this.style.display='none'">
      </div>
      <div class="boot-name">Brightier<b>OS</b></div>
      <div class="boot-spinner"></div>
      <div class="boot-text">Inicializando o sistema…</div>
    </div>
  </div>

  <main class="page">
    <div class="grid cols-3">

      <section class="card" style="grid-column: span 2;">
        <h2>Desempenho</h2>
        <div id="stats"><p class="muted">Carregando métricas...</p></div>
      </section>

      <section class="card">
        <h2>Atalhos</h2>
        <div class="grid" style="gap:10px;">
          <a class="btn ghost block" href="/files.html">🗀 Arquivos</a>
          <a class="btn ghost block" href="/console.html">▣ Console</a>
          <a class="btn ghost block" href="/store.html">🛒 Loja</a>
          <a class="btn ghost block" href="/trash.html">🗑 Lixeira</a>
        </div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Meus Plugins</h2>
        <div id="installed-plugins-list"><p class="muted">Carregando plugins...</p></div>
      </section>

      <section class="card" style="grid-column: span 3;">
        <h2>Atualizações inteligentes</h2>
        <div id="local-changes" style="display:none"></div>
        <div id="update-status"></div>
        <div class="toolbar">
          <button id="checkUpdateBtn" class="btn sm">Verificar atualizações</button>
          <input id="targetVersion" type="text" placeholder="Versão alvo (ex.: 0.4.6) — incremental" style="width:260px" />
          <button id="applyUpdateBtn" class="btn sm" style="display:none">Atualizar agora</button>
        </div>
        <div class="toolbar" style="margin-top:8px">
          <button id="backupBtn" class="btn ghost sm">🗄 Fazer backup</button>
          <button id="changelogBtn" class="btn ghost sm">📝 Ver changelog</button>
          <button id="restoreBtn" class="btn ghost sm">♻ Restaurar backup</button>
        </div>
        <div id="update-history"></div>
      </section>

    </div>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/dashboard.js"></script>
</body>
</html>
