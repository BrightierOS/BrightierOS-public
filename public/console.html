<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="console" data-title="Console" data-sub="Terminal em tempo real.">
  <main class="page">
    <section class="card">
      <h2>Terminal</h2>
      <p class="muted" style="margin-bottom:14px;">Comandos locais: <b>help</b>, <b>about</b>, <b>version</b>, <b>hostname</b>, <b>time</b>, <b>stats</b>, <b>clear</b>, <b>exit</b>. Demais comandos rodam no sistema (Ctrl+C interrompe).</p>
      <div class="terminal" id="terminal">
        <div class="input-line">
          <span class="prompt">brightier&gt;</span>
          <input class="cmdi" id="cmd" autocomplete="off" spellcheck="false" autofocus />
        </div>
      </div>
    </section>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/console.js"></script>
</body>
</html>
