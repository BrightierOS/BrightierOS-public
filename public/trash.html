<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Lixeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="trash" data-title="Lixeira" data-sub="Recupere o que foi perdido.">
  <div id="boot-loader" aria-hidden="true">
    <div class="boot-loader-inner">
      <div class="boot-logo">
        <img src="assets/BrightierOS.png" alt="BrightierOS" onerror="this.style.display='none'">
      </div>
      <div class="boot-name">Brightier<b>OS</b></div>
      <div class="boot-spinner"></div>
      <div class="boot-text">Inicializando o sistema…</div>
    </div>
  </div>

  <main class="page">
    <section class="card">
      <div class="toolbar" style="justify-content:space-between; margin-bottom:12px;">
        <div id="trashStats" class="muted">—</div>
        <div class="row-actions">
          <a class="btn ghost sm" href="/files.html">← Arquivos</a>
          <button id="emptyTrash" class="btn danger sm" style="display:none;">Esvaziar</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Tipo</th><th>Tamanho</th><th>Excluído em</th><th></th></tr></thead>
          <tbody id="trashList"><tr><td colspan="5" class="empty">Carregando...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/trash.js"></script>
</body>
</html>
