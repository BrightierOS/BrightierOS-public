<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightierOS — Criar conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="signup">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <img src="assets/BrightierOS.png" alt="BrightierOS" style="width:38px;height:38px;border-radius:10px;" onerror="this.style.display='none'">
        <span class="name">Brightier<b>OS</b></span>
      </div>
      <h1>Criar conta</h1>
      <p class="sub">Registre um novo usuário</p>
      <p id="inviteInfo" class="muted" style="font-size:13px;margin:-6px 0 14px;display:none">Você foi convidado como <b id="inviteRole">visualizador</b>.</p>
      <p class="muted" id="normalInfo" style="font-size:13px;margin:-6px 0 14px">Você entrará como <b>visualizador</b> (somente leitura). Um administrador pode promovê-lo depois.</p>
      <form id="signupForm" class="stack">
        <div>
          <label for="username">Usuário</label>
          <input id="username" name="username" placeholder="seu usuário" required autocomplete="username" />
        </div>
        <div>
          <label for="displayName">Nome de exibição</label>
          <input id="displayName" name="displayName" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div>
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="uma senha segura" required autocomplete="new-password" />
        </div>
        <button class="btn block" type="submit">Criar conta</button>
      </form>
      <p class="msg" id="message"></p>
      <p class="alt">Já tem conta? <a href="/login.html">Fazer login</a></p>
    </div>
  </div>

  <script src="assets/api.js"></script>
  <script src="assets/auth.js"></script>
</body>
</html>
